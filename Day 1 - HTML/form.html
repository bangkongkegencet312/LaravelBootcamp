<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
</head>
<body>
<article>
    <h1>
        Buat Account Baru!
    </h1>

    <h3>
       Sign Up Form 
    </h3>

    <form action="welcome.html">
        <label for="Input First Name">First name</label><br>
        <input type="text" name="first_name"><br><br>
        
        <label for="Input Last Name">Last Name</label><br>
        <input type="text" name="last_Name"><br><br>

        <label for="gender_2">Gender</label><br>
        <input type="radio" name="gender" value="male">
        <label>Male</label><br>
        <input type="radio" name="gender" value="female">
        <label>Female</label><br>
        <input type="radio" name="gender" value="other">
        <label>Other</label><br><br>

        <label for="Input Nationaly">Nationaly</label><br>
        <select name="Nationaly">
            <option value="indonesia">Indonesia</option>
            <option value="malaysia">Malaysia</option>
            <option value="thailand">Thailand</option>
            <option value="vietnam">Vietnam</option>
            <option value="ngawi_selatan">Ngawi Selatan</option>
        </select><br><br>

        <label for="Input Language Spoken">Language Spoken</label><br>
        <input type="checkbox" name="lang">Bahasa Indonesia<br>
        <input type="checkbox" name="lang">English<br>
        <input type="checkbox" name="lang">Other<br><br>

        <label for="Input Bio">Bio</label><br>
        <textarea name="Bio" rows="10" cols="30"></textarea><br>
        <input type="submit" name="submit">

    </form>

</article>

</body>
</html>
